services:
  db:
    image: postgres:16-alpine
    container_name: sisgfin-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sisgfin
      POSTGRES_USER:     sisgfin
      POSTGRES_PASSWORD: sisgfin123
    ports:
      - "5433:5432"   # use 5432:5432 se não houver outro PostgreSQL na máquina
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sisgfin -d sisgfin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin — interface web para inspecionar o banco (acesse em http://localhost:5050)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sisgfin-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@sisgfin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
