name: Build Windows Installer (MSI)

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do pacote (ex: 1.0.1)'
        required: false
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Override version (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        shell: bash
        run: |
          sed -i "s/packageVersion = \"[^\"]*\"/packageVersion = \"${{ github.event.inputs.version }}\"/" build.gradle.kts

      - name: Executar testes
        run: ./gradlew test --no-daemon
        shell: cmd

      - name: Build MSI
        run: ./gradlew packageMsi --no-daemon
        shell: cmd

      - name: Upload MSI como artefato
        uses: actions/upload-artifact@v4
        with:
          name: SisgFin-windows-${{ github.ref_name }}
          path: build/compose/binaries/main/msi/*.msi
          retention-days: 60

      - name: Criar Release no GitHub (somente em tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/compose/binaries/main/msi/*.msi
          generate_release_notes: true
          name: SisgFin ${{ github.ref_name }}
